services:
  - type: web
    name: rexurops-crm
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn crm_engineering.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: rexurops-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: rexurops-db
    databaseName: crm_engineering_db
    user: postgres
    plan: free
